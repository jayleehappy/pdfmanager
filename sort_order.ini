; PDF 名册管理生成工具 - 排序配置文件
; 此文件定义目录和文件的显示排序顺序
; 不在此列表中的项目，按自然排序排在后面

[SortOrder]
; 自定义排序顺序（从上到下依次排列）
; 名称必须与目录/文件名完全一致（不含 .pdf 后缀）
; 可用序号格式：阿拉伯数字(0,1,2...)、中文数字(一,二,三...)、英文字母(a,b,c...)
; 示例：
; 0-名册
; 1-机关部门以上领导
; 2-cmb机关
; 3-zzb机关

[DisplayNames]
; 显示名称映射（可选）：实际名称 → 显示名称
; 用于隐藏文件后缀或重命名显示
; 格式：实际名称=显示名称
; 示例：
; 机关部门以上领导.pdf=机关部门以上领导
